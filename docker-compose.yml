services:
  app:
    image: blog-front
    container_name: blog-front
  server:
    image: blog-backend
    container_name: blog-backend
  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: reverse-proxy
    depends_on:
      - app